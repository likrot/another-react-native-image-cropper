commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  commands:
    strip-dev-team:
      glob: "*.pbxproj"
      run: |
        sed -i '' -E 's/DEVELOPMENT_TEAM = "?[A-Z0-9]+"?;/DEVELOPMENT_TEAM = "";/g' {staged_files}
        git add {staged_files}
    typecheck:
      run: yarn typecheck
    format-fix:
      glob: "*.{js,ts,tsx}"
      run: npx prettier --write {staged_files} && git add {staged_files}

pre-push:
  commands:
    test:
      run: yarn test
