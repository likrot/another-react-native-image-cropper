nodeLinker: node-modules
nmHoistingLimits: workspaces

yarnPath: .yarn/releases/yarn-4.11.0.cjs

# Supply-chain hardening.
# Verifies downloaded package contents against the lockfile hashes — catches a
# tampered registry mirror or a maliciously republished version.
enableHardenedMode: true

# Blocks all package install-time lifecycle scripts (postinstall, preinstall,
# install). Mitigates the most common supply-chain attack vector — see the
# Sept 2025 chalk/debug compromise. Packages that legitimately need install
# scripts (e.g. those that compile native binaries) must be opted-in via
# `dependenciesMeta.<pkg>.built = true` in package.json.
enableScripts: false

# Privacy.
enableTelemetry: false
